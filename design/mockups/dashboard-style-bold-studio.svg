    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF8A3C"/>
      <stop offset="1" stop-color="#FF5C39"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF1D2"/>
      <stop offset="1" stop-color="#F6D8B2"/>
    </linearGradient>
    <filter id="glow3" x="-160" y="-140" width="1920" height="1260" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="68"/>
    </filter>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#bg3)"/>
  <g filter="url(#glow3)" opacity="0.26">
