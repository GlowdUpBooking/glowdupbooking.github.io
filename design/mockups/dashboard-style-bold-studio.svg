  <text x="390" y="200" fill="#D08E5D" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">HIGH-CONTRAST SYSTEM</text>
  <text x="390" y="260" fill="#FFF4E1" font-family="Arial Black, Inter, sans-serif" font-size="72">A louder, more branded 2026 product feel.</text>
  <text x="392" y="302" fill="#E6BA94" font-family="Arial, sans-serif" font-size="22">Bolder color blocking, bigger type, fewer timid outlines, and more “creator software” attitude.</text>
