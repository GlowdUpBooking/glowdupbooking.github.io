  <rect x="1380" y="54" width="156" height="52" rx="20" fill="#15100D" stroke="#593923"/>
  <text x="1428" y="87" fill="#FFF4E1" font-family="Arial, sans-serif" font-size="18" font-weight="700">Sign out</text>

