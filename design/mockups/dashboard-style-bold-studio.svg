  <text x="670" y="558" fill="#FFF4E1" font-family="Arial Black, Inter, sans-serif" font-size="58">$940</text>

  <rect x="938" y="364" width="598" height="266" rx="30" fill="#140F0B" stroke="#4E311F"/>
  <text x="972" y="406" fill="#FFF4E1" font-family="Arial Black, Inter, sans-serif" font-size="38">Split-screen bookings</text>
  <rect x="972" y="446" width="250" height="144" rx="24" fill="#1A130E" stroke="#5D3A23"/>
  <rect x="1242" y="446" width="260" height="144" rx="24" fill="#1A130E" stroke="#5D3A23"/>
  <text x="1000" y="490" fill="#D99964" font-family="Arial, sans-serif" font-size="12" font-weight="700">LIST</text>
  <text x="1270" y="490" fill="#D99964" font-family="Arial, sans-serif" font-size="12" font-weight="700">DETAIL</text>
  <text x="1000" y="548" fill="#FFF4E1" font-family="Arial, sans-serif" font-size="26" font-weight="700">Cards with stronger color cues</text>
  <text x="1270" y="548" fill="#FFF4E1" font-family="Arial, sans-serif" font-size="26" font-weight="700">Action panel with attitude</text>

  <rect x="350" y="654" width="760" height="270" rx="30" fill="#140F0B" stroke="#4E311F"/>
  <text x="384" y="696" fill="#FFF4E1" font-family="Arial Black, Inter, sans-serif" font-size="38">Merch-ready services</text>
  <text x="384" y="728" fill="#E9BC95" font-family="Arial, sans-serif" font-size="18">Sharper merchandising, larger thumbnails, and more brand expression.</text>
  <rect x="384" y="764" width="210" height="120" rx="24" fill="#21150D" stroke="#653D24"/>
  <rect x="612" y="764" width="210" height="120" rx="24" fill="#21150D" stroke="#653D24"/>
  <rect x="840" y="764" width="236" height="120" rx="24" fill="url(#cream)"/>
  <text x="868" y="812" fill="#21140C" font-family="Arial, sans-serif" font-size="14" font-weight="700">ADD SERVICE</text>
  <text x="868" y="858" fill="#1C120B" font-family="Arial Black, Inter, sans-serif" font-size="40">+</text>

  <rect x="1134" y="654" width="402" height="270" rx="30" fill="#140F0B" stroke="#4E311F"/>
  <text x="1168" y="696" fill="#FFF4E1" font-family="Arial Black, Inter, sans-serif" font-size="38">Why this direction</text>
  <text x="1168" y="746" fill="#E7B98F" font-family="Arial, sans-serif" font-size="20">Feels like a creator brand, not just back-office software.</text>
  <text x="1168" y="794" fill="#D79E6F" font-family="Arial, sans-serif" font-size="18">• Warm orange / cream identity</text>
  <text x="1168" y="830" fill="#D79E6F" font-family="Arial, sans-serif" font-size="18">• Bigger type and stronger blocks</text>
  <text x="1168" y="866" fill="#D79E6F" font-family="Arial, sans-serif" font-size="18">• Best if you want memorable, social-friendly, bold energy</text>
