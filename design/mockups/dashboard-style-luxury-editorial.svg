  <text x="1186" y="744" fill="#A28C73" font-family="Arial, sans-serif" font-size="12">STYLE SIGNAL</text>
  <text x="1186" y="794" fill="#F7F0E8" font-family="Georgia, serif" font-size="38" font-weight="700">Luxury Editorial</text>
