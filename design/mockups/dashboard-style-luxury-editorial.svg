  <text x="960" y="764" fill="#F2C37C" font-family="Georgia, serif" font-size="38" font-weight="700">$50</text>

  <rect x="1120" y="356" width="416" height="568" rx="30" fill="#120F0C" stroke="#2F241B"/>
  <text x="1156" y="400" fill="#F7F0E8" font-family="Georgia, serif" font-size="40" font-weight="700">Why this direction</text>
  <text x="1156" y="454" fill="#D9CBBE" font-family="Arial, sans-serif" font-size="22">Feels premium and trust-building for high-ticket beauty pros.</text>
  <text x="1156" y="520" fill="#B89E83" font-family="Arial, sans-serif" font-size="18">• Editorial serif headlines with softer body UI</text>
  <text x="1156" y="558" fill="#B89E83" font-family="Arial, sans-serif" font-size="18">• Bronze / champagne accent instead of harsh pure white</text>
  <text x="1156" y="596" fill="#B89E83" font-family="Arial, sans-serif" font-size="18">• Stronger card depth and “boutique studio” mood</text>
  <text x="1156" y="634" fill="#B89E83" font-family="Arial, sans-serif" font-size="18">• Best if you want the app to feel premium, intimate, and upscale</text>
