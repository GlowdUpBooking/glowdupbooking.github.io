  <text x="1040" y="795" class="sans" font-size="14" font-weight="700">Founder</text>
  <text x="1040" y="825" class="sans" font-size="22" font-weight="800">$299 / year</text>
  <text x="1040" y="848" class="sans muted" font-size="12">Limited spots · Lifetime perks</text>
