<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0F"/>
      <stop offset="60%" stop-color="#12131A"/>
      <stop offset="100%" stop-color="#0D0F14"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB86B"/>
      <stop offset="100%" stop-color="#FF6A88"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B1E2B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#12141C" stop-opacity="0.9"/>
    </linearGradient>
    <style>
      .sans { font-family: 'Sora', 'Space Grotesk', 'Arial', sans-serif; fill: #F5F5F7; }
      .muted { fill: #B6B6C0; }
      .chip { fill: #0F1117; stroke: #242838; stroke-width: 1; }
      .card { fill: url(#glass); stroke: #2A2F44; stroke-width: 1; }
      .border { stroke: #2A2F44; stroke-width: 1; fill: none; }
      .btn { fill: url(#neon); }
      .btnText { fill: #0B0B0F; font-weight: 700; }
      .ghost { fill: #0F1117; stroke: #2A2F44; stroke-width: 1; }
      .tiny { font-size: 12px; letter-spacing: 1.8px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="900" fill="url(#bg)"/>

  <!-- diagonal accent -->
  <path d="M 980 -40 L 1500 320 L 1500 -40 Z" fill="url(#accent)" opacity="0.18"/>
  <path d="M -60 620 L 520 980 L -60 980 Z" fill="url(#neon)" opacity="0.08"/>

  <!-- top nav -->
  <text x="80" y="70" class="sans" font-size="18" font-weight="700">Glow’d Up Booking</text>
