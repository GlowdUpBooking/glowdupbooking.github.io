  <rect x="960" y="520" rx="18" ry="18" width="400" height="130" class="card"/>

  <text x="110" y="560" class="sans" font-size="16" font-weight="700">Deposit-first checkout</text>
  <text x="110" y="586" class="sans muted" font-size="13">Reduce no-shows and protect your time.</text>

  <text x="550" y="560" class="sans" font-size="16" font-weight="700">Client reminders</text>
  <text x="550" y="586" class="sans muted" font-size="13">Automated confirmations + updates.</text>

  <text x="990" y="560" class="sans" font-size="16" font-weight="700">Studio‑grade dashboard</text>
  <text x="990" y="586" class="sans muted" font-size="13">Appointments, payouts, and growth tools.</text>

  <!-- pricing preview -->
  <text x="80" y="705" class="sans" font-size="30" font-weight="800">Plans that scale with you</text>
  <text x="80" y="735" class="sans muted" font-size="14">Start with free. Go pro when you’re ready.</text>

  <rect x="80" y="760" rx="16" ry="16" width="280" height="120" class="card"/>
  <rect x="390" y="760" rx="16" ry="16" width="280" height="120" class="card"/>
  <rect x="700" y="760" rx="16" ry="16" width="280" height="120" class="card"/>
  <rect x="1010" y="760" rx="16" ry="16" width="350" height="120" fill="#0F1117" stroke="#2A2F44"/>

  <text x="110" y="795" class="sans" font-size="14" font-weight="700">Starter</text>
  <text x="110" y="825" class="sans" font-size="22" font-weight="800">$19</text>
  <text x="110" y="848" class="sans muted" font-size="12">Booking link + deposits</text>

  <text x="420" y="795" class="sans" font-size="14" font-weight="700">Pro</text>
  <text x="420" y="825" class="sans" font-size="22" font-weight="800">$39</text>
  <text x="420" y="848" class="sans muted" font-size="12">Client management</text>

  <text x="730" y="795" class="sans" font-size="14" font-weight="700">Elite</text>
  <text x="730" y="825" class="sans" font-size="22" font-weight="800">$79</text>
