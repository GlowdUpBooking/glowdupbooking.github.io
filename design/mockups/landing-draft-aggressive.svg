<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050507"/>
      <stop offset="60%" stop-color="#0B0C10"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="50%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FFD400"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11131A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0B0D13" stop-opacity="0.95"/>
    </linearGradient>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="15" r="1" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="40" cy="25" r="1" fill="#FFFFFF" opacity="0.05"/>
      <circle cx="80" cy="50" r="1" fill="#FFFFFF" opacity="0.04"/>
      <circle cx="30" cy="70" r="1" fill="#FFFFFF" opacity="0.05"/>
      <circle cx="95" cy="90" r="1" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="60" cy="105" r="1" fill="#FFFFFF" opacity="0.04"/>
    </pattern>
    <style>
      .sans { font-family: 'Space Grotesk', 'Sora', 'Arial Black', sans-serif; fill: #F7F7F9; }
      .cond { font-family: 'Oswald', 'Impact', 'Arial Black', sans-serif; fill: #F7F7F9; }
      .muted { fill: #B8B8C2; }
      .chip { fill: #0C0E13; stroke: #2A2F3F; stroke-width: 1; }
      .card { fill: url(#steel); stroke: #2A2F44; stroke-width: 1; }
      .btn { fill: url(#hot); }
      .btnText { fill: #0A0A0D; font-weight: 900; }
      .ghost { fill: #0C0E13; stroke: #2A2F44; stroke-width: 1; }
      .tiny { font-size: 12px; letter-spacing: 2px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1440" height="900" fill="url(#grain)" opacity="0.3"/>

  <!-- aggressive slashes -->
  <path d="M 820 -60 L 1500 300 L 1500 -60 Z" fill="url(#hot)" opacity="0.22"/>
  <path d="M 900 120 L 1500 420 L 1500 120 Z" fill="url(#ice)" opacity="0.12"/>
  <path d="M -80 620 L 560 1020 L -80 1020 Z" fill="url(#hot)" opacity="0.08"/>

  <!-- top nav -->
  <text x="80" y="68" class="sans" font-size="18" font-weight="700">Glow’d Up Booking</text>
  <text x="1120" y="68" class="sans muted" font-size="14">Pricing</text>
  <text x="1200" y="68" class="sans muted" font-size="14">Log in</text>
  <rect x="1280" y="44" rx="18" ry="18" width="110" height="36" class="btn"/>
  <text x="1302" y="68" class="sans btnText" font-size="14">Start Free</text>

  <!-- hero chip -->
  <rect x="80" y="118" rx="14" ry="14" width="420" height="32" class="chip"/>
  <text x="98" y="140" class="sans tiny" fill="#FF9F0A">BARBERS · STYLISTS · TATTOO · LASH · NAILS</text>

  <!-- hero headline -->
  <text x="80" y="220" class="cond" font-size="64" font-weight="900">BOOKING</text>
  <text x="80" y="286" class="cond" font-size="64" font-weight="900">THAT HITS.</text>
  <text x="80" y="338" class="sans muted" font-size="18">Instant deposits. Zero no‑shows. A booking link your</text>
  <text x="80" y="366" class="sans muted" font-size="18">clients actually use.</text>

