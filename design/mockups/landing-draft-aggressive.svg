  <text x="112" y="434" class="sans btnText" font-size="16">Start Free</text>
  <rect x="265" y="405" rx="22" ry="22" width="170" height="46" class="ghost"/>
  <text x="305" y="434" class="sans" font-size="16">See Plans</text>

  <text x="80" y="476" class="sans muted" font-size="13">Stripe deposits · Auto‑reminders · Pro payouts</text>

  <!-- right hero panel -->
  <rect x="700" y="140" rx="22" ry="22" width="640" height="360" class="card"/>
  <rect x="740" y="178" rx="10" ry="10" width="190" height="26" fill="#10121A" stroke="#2A2F44"/>
  <text x="752" y="196" class="sans" font-size="12" fill="#FFD400">TODAY</text>

  <rect x="740" y="220" rx="14" ry="14" width="560" height="66" fill="#0F121A" stroke="#2A2F44"/>
  <rect x="740" y="296" rx="14" ry="14" width="560" height="66" fill="#0F121A" stroke="#2A2F44"/>
  <rect x="740" y="372" rx="14" ry="14" width="560" height="66" fill="#0F121A" stroke="#2A2F44"/>

  <circle cx="775" cy="253" r="18" fill="#141824" stroke="#2A2F44"/>
  <text x="805" y="258" class="sans" font-size="14">Avery P. · 3:30 PM</text>
  <text x="805" y="280" class="sans muted" font-size="12">Lash Fill · $95 · Deposit captured</text>

  <circle cx="775" cy="329" r="18" fill="#141824" stroke="#2A2F44"/>
  <text x="805" y="334" class="sans" font-size="14">Jordan S. · 5:00 PM</text>
  <text x="805" y="356" class="sans muted" font-size="12">Barber Cut · $45 · Reminder sent</text>

  <circle cx="775" cy="405" r="18" fill="#141824" stroke="#2A2F44"/>
  <text x="805" y="410" class="sans" font-size="14">Nia T. · 6:15 PM</text>
  <text x="805" y="432" class="sans muted" font-size="12">Gel Set · $70 · Confirmed</text>

  <!-- feature strip -->
  <rect x="80" y="520" rx="16" ry="16" width="400" height="130" class="card"/>
  <rect x="520" y="520" rx="16" ry="16" width="400" height="130" class="card"/>
  <rect x="960" y="520" rx="16" ry="16" width="400" height="130" class="card"/>

  <text x="110" y="558" class="sans" font-size="16" font-weight="800">Deposits first</text>
  <text x="110" y="584" class="sans muted" font-size="13">Protect your time. Get paid upfront.</text>

  <text x="550" y="558" class="sans" font-size="16" font-weight="800">Auto‑reminders</text>
  <text x="550" y="584" class="sans muted" font-size="13">Clients show up or reschedule fast.</text>

  <text x="990" y="558" class="sans" font-size="16" font-weight="800">Payouts + stats</text>
  <text x="990" y="584" class="sans muted" font-size="13">Know your month before it ends.</text>

  <!-- pricing preview -->
  <text x="80" y="705" class="cond" font-size="32" font-weight="900">LEVEL UP PLANS</text>
  <text x="80" y="735" class="sans muted" font-size="14">Start free. Upgrade when the bookings hit.</text>

  <rect x="80" y="760" rx="16" ry="16" width="280" height="120" class="card"/>
  <rect x="390" y="760" rx="16" ry="16" width="280" height="120" class="card"/>
  <rect x="700" y="760" rx="16" ry="16" width="280" height="120" class="card"/>
  <rect x="1010" y="760" rx="16" ry="16" width="350" height="120" fill="#0C0E13" stroke="#2A2F44"/>

  <text x="110" y="795" class="sans" font-size="14" font-weight="800">Starter</text>
  <text x="110" y="825" class="cond" font-size="24">$19</text>
  <text x="110" y="848" class="sans muted" font-size="12">Booking link + deposits</text>

  <text x="420" y="795" class="sans" font-size="14" font-weight="800">Pro</text>
  <text x="420" y="825" class="cond" font-size="24">$39</text>
  <text x="420" y="848" class="sans muted" font-size="12">Client management</text>

  <text x="730" y="795" class="sans" font-size="14" font-weight="800">Elite</text>
  <text x="730" y="825" class="cond" font-size="24">$79</text>
  <text x="730" y="848" class="sans muted" font-size="12">Payouts + analytics</text>

  <text x="1040" y="795" class="sans" font-size="14" font-weight="800">Founder</text>
  <text x="1040" y="825" class="cond" font-size="24">$299 / year</text>
  <text x="1040" y="848" class="sans muted" font-size="12">Limited spots · Lifetime perks</text>
</svg>
