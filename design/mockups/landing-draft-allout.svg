<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050506"/>
      <stop offset="55%" stop-color="#0B0C11"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1F5A"/>
      <stop offset="40%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FFE600"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#6E56FF"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12141B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0A0C12" stop-opacity="0.95"/>
    </linearGradient>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="15" r="1" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="40" cy="25" r="1" fill="#FFFFFF" opacity="0.05"/>
      <circle cx="80" cy="50" r="1" fill="#FFFFFF" opacity="0.04"/>
      <circle cx="30" cy="70" r="1" fill="#FFFFFF" opacity="0.05"/>
      <circle cx="95" cy="90" r="1" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="60" cy="105" r="1" fill="#FFFFFF" opacity="0.04"/>
    </pattern>
    <pattern id="halftone" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#FFFFFF" opacity="0.06"/>
    </pattern>
    <pattern id="checks" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="9" height="9" fill="#0F1117"/>
      <rect x="9" y="9" width="9" height="9" fill="#0F1117"/>
      <rect x="9" y="0" width="9" height="9" fill="#161922"/>
      <rect x="0" y="9" width="9" height="9" fill="#161922"/>
    </pattern>
    <style>
      .sans { font-family: 'Space Grotesk', 'Sora', 'Arial Black', sans-serif; fill: #F7F7F9; }
      .cond { font-family: 'Oswald', 'Impact', 'Arial Black', sans-serif; fill: #F7F7F9; }
      .muted { fill: #B8B8C2; }
      .chip { fill: #0C0E13; stroke: #2A2F3F; stroke-width: 1; }
      .card { fill: url(#steel); stroke: #2A2F44; stroke-width: 1; }
      .btn { fill: url(#hot); }
      .btnText { fill: #0A0A0D; font-weight: 900; }
      .ghost { fill: #0C0E13; stroke: #2A2F44; stroke-width: 1; }
      .tiny { font-size: 12px; letter-spacing: 2px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1440" height="900" fill="url(#grain)" opacity="0.32"/>

  <!-- raw slashes and paint -->
  <path d="M 760 -80 L 1500 300 L 1500 -80 Z" fill="url(#hot)" opacity="0.26"/>
  <path d="M 860 100 L 1500 430 L 1500 100 Z" fill="url(#ice)" opacity="0.14"/>
  <path d="M -120 620 L 540 1040 L -120 1040 Z" fill="url(#hot)" opacity="0.10"/>
  <path d="M -40 460 C 160 360, 380 320, 560 300 L 560 350 C 380 370, 160 420, -40 520 Z" fill="#11141C" opacity="0.8"/>

  <!-- top nav -->
  <text x="80" y="68" class="sans" font-size="18" font-weight="700">Glow’d Up Booking</text>
  <text x="1120" y="68" class="sans muted" font-size="14">Pricing</text>
  <text x="1200" y="68" class="sans muted" font-size="14">Log in</text>
  <rect x="1280" y="44" rx="18" ry="18" width="110" height="36" class="btn"/>
  <text x="1302" y="68" class="sans btnText" font-size="14">Start Free</text>

  <!-- hero chip -->
  <rect x="80" y="118" rx="14" ry="14" width="460" height="32" class="chip"/>
  <text x="98" y="140" class="sans tiny" fill="#FF9F0A">BARBERS · STYLISTS · TATTOO · LASH · NAILS</text>

  <!-- massive headline -->
  <text x="80" y="215" class="cond" font-size="84" font-weight="900">BOOKING</text>
  <text x="80" y="300" class="cond" font-size="84" font-weight="900">BUILT TO HIT.</text>
  <text x="80" y="350" class="sans muted" font-size="18">Fast links. Instant deposits. A dashboard that feels like</text>
  <text x="80" y="378" class="sans muted" font-size="18">a studio, not a spreadsheet.</text>

  <!-- hero buttons -->
  <rect x="80" y="418" rx="22" ry="22" width="180" height="48" class="btn"/>
  <text x="110" y="449" class="sans btnText" font-size="16">Start Free</text>
  <rect x="275" y="418" rx="22" ry="22" width="180" height="48" class="ghost"/>
  <text x="315" y="449" class="sans" font-size="16">See Plans</text>

  <text x="80" y="488" class="sans muted" font-size="13">Stripe deposits · Auto‑reminders · Pro payouts</text>

  <!-- sticker tags -->
  <g transform="translate(520,190) rotate(-10)">
    <rect x="0" y="0" rx="14" ry="14" width="140" height="32" fill="url(#ice)"/>
    <text x="16" y="21" class="sans" font-size="12" fill="#0B0C11" font-weight="800">NO‑SHOWS ↓</text>
  </g>
  <g transform="translate(560,250) rotate(6)">
    <rect x="0" y="0" rx="14" ry="14" width="150" height="32" fill="#FFE600"/>
    <text x="16" y="21" class="sans" font-size="12" fill="#0B0C11" font-weight="900">DEPOSITS ↑</text>
  </g>

  <!-- collage panel -->
  <rect x="700" y="140" rx="24" ry="24" width="640" height="360" class="card"/>
  <rect x="720" y="160" rx="16" ry="16" width="260" height="160" fill="#0F1117" stroke="#2A2F44"/>
  <rect x="990" y="160" rx="16" ry="16" width="330" height="160" fill="#12141B" stroke="#2A2F44"/>
  <rect x="720" y="330" rx="16" ry="16" width="350" height="150" fill="#11141C" stroke="#2A2F44"/>
  <rect x="1080" y="330" rx="16" ry="16" width="260" height="150" fill="#0F1117" stroke="#2A2F44"/>

  <!-- faux photos with halftone overlays -->
  <rect x="720" y="160" rx="16" ry="16" width="260" height="160" fill="url(#hot)" opacity="0.25"/>
  <rect x="720" y="160" rx="16" ry="16" width="260" height="160" fill="url(#halftone)"/>
  <rect x="990" y="160" rx="16" ry="16" width="330" height="160" fill="url(#ice)" opacity="0.22"/>
  <rect x="990" y="160" rx="16" ry="16" width="330" height="160" fill="url(#halftone)"/>

  <text x="740" y="210" class="sans" font-size="12" fill="#FFD400">APPT 3:30 PM</text>
  <text x="740" y="238" class="sans" font-size="14">Avery P. · Lash Fill</text>
  <text x="1010" y="210" class="sans" font-size="12" fill="#00E5FF">PAYOUTS READY</text>
  <text x="1010" y="238" class="sans" font-size="14">$1,240 this week</text>

  <!-- big checkered band -->
  <rect x="80" y="520" width="1280" height="26" fill="url(#checks)" opacity="0.8"/>

  <!-- feature strip -->
  <rect x="80" y="560" rx="16" ry="16" width="400" height="130" class="card"/>
  <rect x="520" y="560" rx="16" ry="16" width="400" height="130" class="card"/>
  <rect x="960" y="560" rx="16" ry="16" width="400" height="130" class="card"/>

  <text x="110" y="598" class="sans" font-size="16" font-weight="900">Deposits first</text>
  <text x="110" y="624" class="sans muted" font-size="13">Get paid before you work.</text>

  <text x="550" y="598" class="sans" font-size="16" font-weight="900">Auto‑reminders</text>
  <text x="550" y="624" class="sans muted" font-size="13">Clients show up or reschedule fast.</text>

  <text x="990" y="598" class="sans" font-size="16" font-weight="900">Payouts + stats</text>
  <text x="990" y="624" class="sans muted" font-size="13">Know your month before it ends.</text>

  <!-- pricing preview -->
  <text x="80" y="742" class="cond" font-size="34" font-weight="900">LEVEL UP PLANS</text>
  <text x="80" y="770" class="sans muted" font-size="14">Start free. Upgrade when the bookings hit.</text>

  <rect x="80" y="790" rx="16" ry="16" width="280" height="100" class="card"/>
  <rect x="390" y="790" rx="16" ry="16" width="280" height="100" class="card"/>
  <rect x="700" y="790" rx="16" ry="16" width="280" height="100" class="card"/>
  <rect x="1010" y="790" rx="16" ry="16" width="350" height="100" fill="#0C0E13" stroke="#2A2F44"/>

  <text x="110" y="820" class="sans" font-size="14" font-weight="800">Starter</text>
  <text x="110" y="850" class="cond" font-size="24">$19</text>

  <text x="420" y="820" class="sans" font-size="14" font-weight="800">Pro</text>
  <text x="420" y="850" class="cond" font-size="24">$39</text>

  <text x="730" y="820" class="sans" font-size="14" font-weight="800">Elite</text>
  <text x="730" y="850" class="cond" font-size="24">$79</text>

  <text x="1040" y="820" class="sans" font-size="14" font-weight="800">Founder</text>
  <text x="1040" y="850" class="cond" font-size="24">$299 / year</text>
</svg>
